<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>本格オンライン・マルバツゲーム</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div id="homeScreen" class="screen">
            <h1>マルバツ・オンライン</h1>
            <p class="user-info">現在のユーザー名: <span id="userNameDisplay">ゲスト</span></p>
            <div class="menu-buttons">
                <button id="matchingBtn" class="btn-primary">🎮 マッチング</button>
                <button id="spectateBtn" class="btn-secondary">👁️ 観覧する</button>
                <button id="editNameBtn" class="btn-outline">✏️ ユーザー名変更</button>
            </div>
        </div>

        <div id="matchingScreen" class="screen hidden">
            <h2>マッチング中...</h2>
            <div class="loader"></div>
            <p>対戦相手を探しています...</p>
            <button id="cancelMatchBtn" class="btn-outline mt-20">キャンセル</button>
        </div>

        <div id="spectateScreen" class="screen hidden">
            <h2>現在行われている試合</h2>
            <div id="roomList" class="room-list">
                </div>
            <button id="backFromSpectateBtn" class="btn-outline mt-20">ホームに戻る</button>
        </div>

        <div id="gameScreen" class="screen hidden">
            <div class="game-header">
                <h2 id="matchTitle">対戦ルーム</h2>
                <p id="myRoleDisplay">あなたの状態: 確認中...</p>
            </div>
            
            <div id="status">通信中...</div>
            <div class="board" id="board"></div>
            
            <div class="game-footer">
                <button id="leaveGameBtn" class="btn-outline">退出してホームに戻る</button>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-database-compat.js"></script>
    <script src="app.js"></script>
</body>
</html>
