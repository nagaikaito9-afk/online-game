<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>本格オンラインボードゲーム</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
</head>
<body>
    <div class="container">
        <div id="homeScreen" class="screen">
            <h1>ボードゲーム・アリーナ</h1>
            <div class="user-info">
                <p>ユーザー名: <span id="userNameDisplay">ゲスト</span></p>
                <button id="openNameModalBtn" class="btn-small">変更</button>
            </div>
            <div class="menu-buttons">
                <button id="gameSelectBtn" class="btn-primary">🎮 ゲームセレクト</button>
                <button id="spectateBtn" class="btn-secondary">👁️ 観覧する</button>
                <button id="settingsBtn" class="btn-outline">⚙️ 設定</button>
            </div>
            <div class="signature">by.ただのネコ好き</div>
        </div>

        <div id="gameSelectScreen" class="screen hidden">
            <h2>ゲームを選択</h2>
            <div class="game-list">
                <button class="btn-game" data-game="tictactoe">
                    〇✕ゲーム<br><span class="rank-display" id="rank-tictactoe"></span>
                    <div class="progress-bar"><div class="progress-fill" id="progress-tictactoe"></div></div>
                </button>
                <button class="btn-game" data-game="othello">
                    オセロ<br><span class="rank-display" id="rank-othello"></span>
                    <div class="progress-bar"><div class="progress-fill" id="progress-othello"></div></div>
                </button>
                <button class="btn-game" data-game="chess">
                    チェス<br><span class="rank-display" id="rank-chess"></span>
                    <div class="progress-bar"><div class="progress-fill" id="progress-chess"></div></div>
                </button>
                <button class="btn-game" data-game="go">
                    囲碁<br><span class="rank-display" id="rank-go"></span>
                    <div class="progress-bar"><div class="progress-fill" id="progress-go"></div></div>
                </button>
                <button class="btn-game trump-btn" id="trumpCategoryBtn" style="grid-column: span 2;">
                    🃏 トランプ
                </button>
            </div>
            <button class="btn-outline mt-20 backToHomeBtn">戻る</button>
        </div>

        <div id="trumpSelectScreen" class="screen hidden">
            <h2>トランプゲームを選択</h2>
            <div class="game-list">
                <button class="btn-game" data-game="babanuki">ババ抜き</button>
                <button class="btn-game" data-game="speed">スピード</button>
                <button class="btn-game" data-game="sevens">7ならべ</button>
                <button class="btn-game" data-game="memory">神経衰弱</button>
                <button class="btn-game" data-game="daifugo" style="grid-column: span 2;">大富豪</button>
            </div>
            <button class="btn-outline mt-20" onclick="switchScreen('gameSelectScreen')">戻る</button>
        </div>

        <div id="modeSelectScreen" class="screen hidden">
            <h2 id="selectedGameTitle"></h2>
            <p id="currentRankDisplay"></p>
            
            <div id="goSettings" class="hidden" style="margin-bottom: 15px; background: #f8f9fa; padding: 10px; border-radius: 8px; text-align: left;">
                <label>盤面: 
                    <select id="goSizeSelect">
                        <option value="9">9路盤</option>
                        <option value="13">13路盤</option>
                        <option value="19">19路盤</option>
                    </select>
                </label><br>
                <label style="display: block; margin-top: 5px;">置き石(0~9): 
                    <input type="number" id="goHandicap" min="0" max="9" value="0" style="width: 50px;">
                </label>
            </div>

            <div class="menu-buttons">
                <button id="modeLocalBtn" class="btn-primary">📱 近くの人と対戦</button>
                <button id="modeAIBtn" class="btn-primary">🤖 AIと対戦</button>
                <button id="modeOnlineBtn" class="btn-secondary">🌐 オンライン対戦</button>
                <button id="privateRoomSelectBtn" class="btn-secondary">🔑 部屋を作成、入室</button>
            </div>
            <button id="backToGameSelectBtn" class="btn-outline mt-20">戻る</button>
        </div>

        <div id="privateRoomScreen" class="screen hidden">
            <h2>部屋を作成・入室</h2>
            <p>合言葉（暗号）を入力してください</p>
            <input type="text" id="roomPasswordInput" placeholder="合言葉を入力" style="width: 80%; padding: 10px; margin-bottom: 10px;">
            <p id="privateRoomError" style="color: red; font-size: 0.9rem; margin-bottom: 10px; min-height: 1.2em;"></p>
            <div class="menu-buttons">
                <button id="createPrivateRoomBtn" class="btn-secondary">部屋を作成</button>
                <button id="joinPrivateRoomBtn" class="btn-primary">入室する</button>
            </div>
            <button class="btn-outline mt-20" onclick="switchScreen('modeSelectScreen')">戻る</button>
        </div>

        <div id="matchingScreen" class="screen hidden">
            <h2>マッチング中...</h2>
            <div class="loader"></div>
            <p id="matchingText">対戦相手を探しています</p>
            <button id="cancelMatchBtn" class="btn-outline mt-20">キャンセル</button>
        </div>

        <div id="gameScreen" class="screen hidden">
            <h2 id="matchTitle">対戦</h2>
            <p id="myRoleDisplay"></p>
            <p id="status"></p>

            <div id="goCapturedDisplay" class="hidden" style="margin-bottom: 10px; font-weight: bold;">
                黒アゲハマ: <span id="capBlack">0</span>個 | 白アゲハマ: <span id="capWhite">0</span>個
            </div>

            <div id="board" class="board"></div>

            <div style="display: flex; gap: 10px; margin-bottom: 10px;">
                <button id="passBtn" class="btn-secondary hidden" style="flex: 1;">パス</button>
                <button id="resignBtn" class="btn-primary" style="flex: 1; background-color: #c0392b;">🏳️ 投了</button>
            </div>

            <div id="chatArea" class="chat-area hidden">
                <div id="chatMessages" class="chat-messages"></div>
                <div class="chat-input-area">
                    <input type="text" id="chatInput" placeholder="メッセージ...">
                    <button id="sendChatBtn" class="btn-secondary">送信</button>
                </div>
            </div>
            <button id="leaveGameBtn" class="btn-outline mt-20">退出する</button>
        </div>

        <div id="nameModal" class="modal hidden">
            <div class="modal-content">
                <h3>名前を変更</h3>
                <input type="text" id="nameInput" placeholder="新しい名前">
                <div class="modal-buttons">
                    <button id="saveNameBtn" class="btn-primary">保存</button>
                    <button id="cancelNameBtn" class="btn-outline">キャンセル</button>
                </div>
            </div>
        </div>

        <div id="settingsModal" class="modal hidden">
            <div class="modal-content">
                <h3>設定</h3>
                <div class="setting-item"><span>BGM音量</span><input type="range" id="bgmVolumeSlider" min="0" max="1" step="0.05"></div>
                <div class="setting-item mt-20"><span>SE音量</span><input type="range" id="seVolumeSlider" min="0" max="1" step="0.05"></div>
                <button id="closeSettingsBtn" class="btn-outline mt-20">閉じる</button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
